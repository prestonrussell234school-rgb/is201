<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preston Russell</title>
    <link rel="stylesheet" href="../css/stylesai.css">
    <style>
        /* Game Styling */
        #game-wrapper {
            max-width: 600px;
            margin: 50px auto;
            padding: 30px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            border: 1px solid #eee;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            border-bottom: 4px solid #346ba3;
        }

        .stat-label { font-size: 0.8rem; text-transform: uppercase; color: #666; font-weight: bold; }
        .stat-value { font-size: 1.4rem; font-weight: bold; color: #346ba3; display: block; }

        #card-display {
            min-height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: #fff;
            border: 2px dashed #cbd5e0;
            border-radius: 15px;
            margin-bottom: 30px;
            font-size: 1.2rem;
            line-height: 1.5;
            color: #2d3748;
        }

        .action-btns { display: flex; gap: 15px; }
        
        .game-btn {
            flex: 1;
            padding: 18px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            font-size: 1rem;
        }

        .btn-a { background: #e2e8f0; color: #2d3748; }
        .btn-b { background: #346ba3; color: white; }
        .game-btn:hover { transform: scale(1.03); }
        .game-btn:active { transform: scale(0.98); }

        #start-screen, #end-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            border-radius: 20px;
        }

        .container-relative { position: relative; min-height: 500px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div>
        <nav class="navbar">
            <ul class="nav-menu">
                <li><a href="../index.html">Home</a></li>
                <li><a href="ai.html">Click Me</a></li>
                <li><a href="resume.html">Resume</a></li>
                <li><a href="tableau.html">Tableau</a></li>
            </ul>
        </nav>
    </div>

    <div id="game-wrapper" class="container-relative">
        
        <div id="start-screen">
            <h1 style="color: #346ba3;">The Startup Hustle</h1>
            <p>Can you survive 10 weeks of the grind?</p>
            <button class="game-btn btn-b" onclick="startGame()" style="width: 200px;">Begin Venture</button>
        </div>

        <div id="end-screen" class="hidden">
            <h2 id="end-title">Game Over</h2>
            <p id="end-reason"></p>
            <button class="game-btn btn-b" onclick="location.reload()" style="width: 200px;">Try Again</button>
        </div>

        <h2 style="color: #346ba3; margin-top: 0;">Founder Dashboard</h2>
        
        <div class="stats-grid">
            <div class="stat-box">
                <span class="stat-label">Bank Account</span>
                <span class="stat-value" id="cash-val">$10,000</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Market Hype</span>
                <span class="stat-value" id="hype-val">20%</span>
            </div>
        </div>

        <div id="card-display">Initializing...</div>

        <div class="action-btns">
            <button id="optA" class="game-btn btn-a" onclick="handleChoice('L')">Option A</button>
            <button id="optB" class="game-btn btn-b" onclick="handleChoice('R')">Option B</button>
        </div>

        <p style="margin-top: 20px; color: #a0aec0; font-weight: bold;">Week <span id="week-val">1</span> of 10</p>
    </div>

    <script>
        let cash = 10000;
        let hype = 20;
        let week = 1;
        let currentScenario = null;

        const scenarios = [
            { q: "A local business wants a custom data dashboard. It'll take all week.", a: "Reject (-$0)", b: "Build it (+$2k, -10% Hype)", aEffect: [0, 0], bEffect: [2000, -10] },
            { q: "An influencer offers to post your startup for a fee.", a: "Ignore (-$0)", b: "Pay $3k (+30% Hype)", aEffect: [0, -5], bEffect: [-3000, 30] },
            { q: "Your servers are crashing from traffic!", a: "Patch it (-$500)", b: "Upgrade (-$2k, +10% Hype)", aEffect: [-500, -5], bEffect: [-2000, 10] },
            { q: "A competitor just launched a similar feature.", a: "Ignore them", b: "Run ads (-$1k, +15% Hype)", aEffect: [0, -10], bEffect: [-1000, 15] },
            { q: "You're invited to a major networking mixer.", a: "Stay & Code", b: "Attend (-$200, +10% Hype)", aEffect: [0, 0], bEffect: [-200, 10] }
        ];

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            nextTurn();
        }

        function nextTurn() {
            if (week > 10) {
                winGame();
                return;
            }
            
            currentScenario = scenarios[Math.floor(Math.random() * scenarios.length)];
            document.getElementById('card-display').innerText = currentScenario.q;
            document.getElementById('optA').innerText = currentScenario.a;
            document.getElementById('optB').innerText = currentScenario.b;
            updateUI();
        }

        function handleChoice(choice) {
            let effects = (choice === 'L') ? currentScenario.aEffect : currentScenario.bEffect;
            
            cash += effects[0];
            hype += effects[1];
            
            // Weekly Burn Rate
            cash -= 800; 
            week++;

            if (cash <= 0) {
                gameOver("Your bank account hit zero. The dream is over.");
            } else if (hype <= 0) {
                gameOver("Your market hype hit zero. Nobody is visiting your site.");
            } else {
                nextTurn();
            }
        }

        function updateUI() {
            document.getElementById('cash-val').innerText = "$" + cash.toLocaleString();
            document.getElementById('hype-val').innerText = hype + "%";
            document.getElementById('week-val').innerText = week;
        }

        function gameOver(reason) {
            document.getElementById('end-screen').classList.remove('hidden');
            document.getElementById('end-title').innerText = "Venture Failed";
            document.getElementById('end-reason').innerText = reason;
        }

        function winGame() {
            document.getElementById('end-screen').classList.remove('hidden');
            document.getElementById('end-title').innerText = "IPO Success!";
            document.getElementById('end-reason').innerText = "You survived the hustle and your startup was acquired!";
        }
    </script>
</body>
</html>
